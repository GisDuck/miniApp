networks:
  proxy:
    name: shop_proxy
    driver: bridge

volumes:
  redis-data:

services:
  postgres:
    image: postgres:16-alpine
    container_name: shop_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    networks:
      - proxy
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: shop_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    expose:
      - "6379"
    volumes:
      - redis-data:/data
    networks:
      - proxy

  # pgadmin:
  #   image: dpage/pgadmin4:9
  #   container_name: shop_pgadmin
  #   restart: unless-stopped
  #   environment:
  #     PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
  #     PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
  #   networks:
  #     - proxy
  #   expose:
  #     - "80"
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   labels:
  #     - "traefik.enable=true"
  #     - "traefik.docker.network=shop_proxy"

  #     - "traefik.http.routers.pgadmin.rule=Host(`pgadmin.${BASE_URL}`)"
  #     - "traefik.http.routers.pgadmin.entrypoints=websecure"
  #     - "traefik.http.routers.pgadmin.tls.certresolver=le"
  #     - "traefik.http.services.pgadmin.loadbalancer.server.port=80"
    
  prisma-studio:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: shop_prisma_studio
    restart: "no"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
    command: >
      sh -lc "npx prisma studio --schema prisma/schema.prisma --hostname 0.0.0.0 --port 5555"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - proxy
    ports:
      - "127.0.0.1:5555:5555"

  minio:
    image: minio/minio:latest
    container_name: shop_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - ./minio-data:/data
    networks:
      - proxy
    expose:
      - "9000"
      - "9001"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=shop_proxy"

      # Консоль MinIO
      - "traefik.http.routers.minio-console.rule=Host(`minio.${BASE_URL}`)"
      - "traefik.http.routers.minio-console.entrypoints=websecure"
      - "traefik.http.routers.minio-console.tls.certresolver=le"
      - "traefik.http.services.minio-console.loadbalancer.server.port=9001"

      - "traefik.http.routers.tgminiapp-images.rule=Host(`tgminiapp.${BASE_URL}`) && PathPrefix(`/img`)"
      - "traefik.http.routers.tgminiapp-images.entrypoints=websecure"
      - "traefik.http.routers.tgminiapp-images.tls.certresolver=le"
      - "traefik.http.routers.tgminiapp-images.priority=110"
      - "traefik.http.routers.tgminiapp-images.middlewares=tgminiapp-images-path"
      - "traefik.http.routers.tgminiapp-images.service=tgminiapp-images"
      - "traefik.http.middlewares.tgminiapp-images-path.replacepathregex.regex=^/img/(.*)"
      - "traefik.http.middlewares.tgminiapp-images-path.replacepathregex.replacement=/${MINIO_BUCKET}/img/$${1}"
      - "traefik.http.services.tgminiapp-images.loadbalancer.server.port=9000"

  admin:
    build:
      context: .
      dockerfile: admin/Dockerfile
    container_name: shop_admin
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: 8080
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      ADMIN_AUTH_FILE: /app/admin/auth/users.json
      ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET:-change-me-before-production}
      ADMIN_COOKIE_SECURE: "false"
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
    volumes:
      - ./admin/auth/users.json:/app/admin/auth/users.json:ro
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - proxy
    ports:
      - "127.0.0.1:${ADMIN_PORT:-9346}:8080"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shop_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      FRONTEND_URL: ${TGMINIAPP_FRONTEND_URL}
      REDIS_URL: redis://redis:6379

      # пригодится позже для загрузки картинок товаров
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    networks:
      - proxy
    expose:
      - "3000"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=shop_proxy"

      - "traefik.http.routers.tgminiapp-backend.rule=Host(`tgminiapp.${BASE_URL}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.tgminiapp-backend.entrypoints=websecure"
      - "traefik.http.routers.tgminiapp-backend.tls.certresolver=le"
      - "traefik.http.routers.tgminiapp-backend.priority=100"
      - "traefik.http.routers.tgminiapp-backend.service=tgminiapp-backend"
      - "traefik.http.routers.tgminiapp-backend.middlewares=tgminiapp-backend-strip-api"

      - "traefik.http.middlewares.tgminiapp-backend-strip-api.stripprefix.prefixes=/api"

      - "traefik.http.services.tgminiapp-backend.loadbalancer.server.port=3000"

      - "traefik.http.routers.tgminiapp-backend-health.rule=Host(`tgminiapp.${BASE_URL}`) && PathPrefix(`/health`)"
      - "traefik.http.routers.tgminiapp-backend-health.entrypoints=websecure"
      - "traefik.http.routers.tgminiapp-backend-health.tls.certresolver=le"
      - "traefik.http.routers.tgminiapp-backend-health.priority=100"
      - "traefik.http.routers.tgminiapp-backend-health.service=tgminiapp-backend"


  tgminiapp_frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        TGMINIAPP_VITE_API_URL: ${TGMINIAPP_VITE_API_URL}
    container_name: tgminiapp_frontend
    restart: unless-stopped
    networks:
      - proxy
    expose:
      - "80"
    depends_on:
      - backend
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=shop_proxy"

      - "traefik.http.routers.tgminiapp-frontend.rule=Host(`tgminiapp.${BASE_URL}`)"
      - "traefik.http.routers.tgminiapp-frontend.entrypoints=websecure"
      - "traefik.http.routers.tgminiapp-frontend.tls.certresolver=le"
      - "traefik.http.routers.tgminiapp-frontend.priority=10"
      - "traefik.http.services.tgminiapp-frontend.loadbalancer.server.port=80"

  traefik:
    image: traefik:v2.11
    container_name: shop_traefik
    restart: unless-stopped
    command:
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"

      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"

      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"

      - "--api.dashboard=true"

      - "--certificatesresolvers.le.acme.email=${TRAEFIK_EMAIL}"
      - "--certificatesresolvers.le.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.le.acme.httpchallenge=true"
      - "--certificatesresolvers.le.acme.httpchallenge.entrypoint=web"

      - "--log.level=INFO"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/acme:/letsencrypt
      - ./traefik/auth:/auth:ro
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=shop_proxy"

      - "traefik.http.routers.traefik.rule=Host(`traefik.${BASE_URL}`)"
      - "traefik.http.routers.traefik.entrypoints=websecure"
      - "traefik.http.routers.traefik.tls.certresolver=le"
      - "traefik.http.routers.traefik.service=api@internal"

      - "traefik.http.middlewares.traefik-auth.basicauth.usersfile=/auth/users"
      - "traefik.http.routers.traefik.middlewares=traefik-auth"
